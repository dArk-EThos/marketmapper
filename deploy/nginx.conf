# Market Mapper Nginx Configuration
# Deploy target: Ubuntu LXC behind Cloudflare Tunnel (SSL terminated at Cloudflare)

upstream marketmapper {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name marketmapper.ca www.marketmapper.ca;

    # Cloudflare Tunnel handles SSL — trust X-Forwarded-Proto from Cloudflare
    # This allows Django's SECURE_PROXY_SSL_HEADER to work correctly

    client_max_body_size 10M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static files — served directly by Nginx
    location /static/ {
        alias /opt/marketmapper/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Media files — served directly by Nginx
    location /media/ {
        alias /opt/marketmapper/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Favicon
    location /favicon.ico {
        alias /opt/marketmapper/staticfiles/favicon.ico;
        expires 30d;
        access_log off;
    }

    # Proxy to Gunicorn
    location / {
        proxy_pass http://marketmapper;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_redirect off;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
