{% extends "unfold/layouts/base.html" %}
{% load static %}

{% block extrahead %}
    {{ block.super }}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Additional modern enhancements */
        .header-logo {
            transition: all 0.3s ease !important;
        }
        
        .header-logo:hover {
            transform: scale(1.05) !important;
        }
        
        /* Animated background */
        body {
            position: relative;
            overflow-x: hidden;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(16, 185, 129, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(244, 114, 182, 0.1) 0%, transparent 50%);
            z-index: -1;
            pointer-events: none;
        }
        
        /* Floating particles animation */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(99, 102, 241, 0.3);
            border-radius: 50%;
            animation: float 20s infinite linear;
        }
        
        .particle:nth-child(2) { 
            background: rgba(16, 185, 129, 0.3);
            animation-delay: -5s; 
        }
        
        .particle:nth-child(3) { 
            background: rgba(244, 114, 182, 0.3);
            animation-delay: -10s; 
        }
        
        .particle:nth-child(4) { 
            background: rgba(251, 146, 60, 0.3);
            animation-delay: -15s; 
        }
        
        @keyframes float {
            0% {
                transform: translateY(100vh) translateX(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) translateX(100px) rotate(360deg);
                opacity: 0;
            }
        }
        
        /* Enhanced focus states */
        *:focus {
            outline: 2px solid rgba(99, 102, 241, 0.5) !important;
            outline-offset: 2px !important;
        }
        
        /* Smooth scroll */
        html {
            scroll-behavior: smooth;
        }
        
        /* Loading state improvements */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        
        .loading-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .loader {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(99, 102, 241, 0.1);
            border-left: 4px solid #6366f1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
{% endblock %}

{% block content %}
    <!-- Floating particles -->
    <div class="particles">
        <div class="particle" style="left: 10%; animation-duration: 25s;"></div>
        <div class="particle" style="left: 30%; animation-duration: 30s;"></div>
        <div class="particle" style="left: 60%; animation-duration: 20s;"></div>
        <div class="particle" style="left: 80%; animation-duration: 35s;"></div>
    </div>
    
    <!-- Loading overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loader"></div>
    </div>
    
    {{ block.super }}
{% endblock %}

{% block extrajs %}
    {{ block.super }}
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Enhanced interactions
            const cards = document.querySelectorAll('.module, .card, .results');
            
            cards.forEach(card => {
                card.addEventListener('mouseenter', function() {
                    this.style.transform = 'translateY(-2px)';
                });
                
                card.addEventListener('mouseleave', function() {
                    this.style.transform = 'translateY(0)';
                });
            });
            
            // Form enhancements
            const inputs = document.querySelectorAll('input, textarea, select');
            inputs.forEach(input => {
                input.addEventListener('focus', function() {
                    this.parentElement.style.transform = 'scale(1.01)';
                });
                
                input.addEventListener('blur', function() {
                    this.parentElement.style.transform = 'scale(1)';
                });
            });
            
            // Loading states for form submissions
            const forms = document.querySelectorAll('form');
            const loadingOverlay = document.getElementById('loadingOverlay');
            
            forms.forEach(form => {
                form.addEventListener('submit', function() {
                    loadingOverlay.classList.add('active');
                });
            });
            
            // Hide loading on page load
            window.addEventListener('load', function() {
                loadingOverlay.classList.remove('active');
            });
        });
    </script>
{% endblock %}
