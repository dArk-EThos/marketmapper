{# Reusable newsletter signup form #}
<form method="post" action="{% url 'newsletter:subscribe' %}" id="newsletter-form" class="w-full max-w-md mx-auto">
    {% csrf_token %}
    <div class="flex flex-col sm:flex-row gap-3">
        <label for="newsletter-email" class="sr-only">Email address</label>
        <input
            type="email"
            id="newsletter-email"
            name="email"
            placeholder="you@example.com"
            required
            class="flex-1 px-4 py-3 rounded-lg border border-warm-border bg-white text-gray-800 placeholder-gray-400 focus:ring-2 focus:ring-prairie-light focus:border-prairie-light transition-colors text-sm"
        >
        <button type="submit"
                class="px-6 py-3 rounded-lg bg-prairie text-white font-semibold text-sm hover:bg-prairie-light transition-colors shadow-sm hover:shadow whitespace-nowrap">
            Subscribe
        </button>
    </div>
    <div id="newsletter-msg" class="mt-2 text-sm text-center hidden"></div>
</form>

<script>
(function() {
    const form = document.getElementById('newsletter-form');
    const msg = document.getElementById('newsletter-msg');
    if (!form) return;
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        const fd = new FormData(form);
        fetch(form.action, { method: 'POST', body: fd, headers: { 'X-Requested-With': 'XMLHttpRequest' } })
            .then(r => r.json())
            .then(data => {
                msg.textContent = data.message || 'Thanks for subscribing!';
                msg.className = 'mt-2 text-sm text-center text-prairie-light font-medium';
                msg.classList.remove('hidden');
                form.querySelector('input[type=email]').value = '';
            })
            .catch(() => {
                msg.textContent = 'Something went wrong. Try again.';
                msg.className = 'mt-2 text-sm text-center text-red-600 font-medium';
                msg.classList.remove('hidden');
            });
    });
})();
</script>
